name: CI

on:
  pull_request:
  push:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: tulipmetric
          MYSQL_USER: user
          MYSQL_PASSWORD: your-db-password
          MYSQL_ROOT_PASSWORD: root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/tulipmetric
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: your-db-password
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
      RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create .env for CI
        run: |
          cat <<EOF > .env
          SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
          SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
          SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-dummy-google-client-id}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-dummy-google-client-secret}
          NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-dummy-naver-client-id}
          NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-dummy-naver-client-secret}
          JWT_SECRET=${JWT_SECRET:-dummy-jwt-secret-for-ci-only}
          RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY:-dummy-recaptcha-site-key}
          RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-dummy-recaptcha-secret-key}
          EOF

      - name: Create application.properties for CI
        run: |
          cat <<'EOF' > src/main/resources/application.properties
          spring.application.name=Tulipmetric
          spring.config.import=optional:file:.env[.properties]

          spring.datasource.url=${SPRING_DATASOURCE_URL}
          spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
          spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

          spring.jpa.hibernate.ddl-auto=none
          logging.level.org.springframework.security=DEBUG

          spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
          spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
          spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
          spring.security.oauth2.client.registration.google.scope=profile,email

          spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
          spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
          spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
          spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
          spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
          spring.security.oauth2.client.registration.naver.scope=name,email
          spring.security.oauth2.client.registration.naver.client-name=Naver
          spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
          spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
          spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
          spring.security.oauth2.client.provider.naver.user-name-attribute=response

          jwt.secret=${JWT_SECRET}
          jwt.access-token-ms=1800000

          recaptcha.site-key=${RECAPTCHA_SITE_KEY}
          recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

          logging.level.project7.tulipmetric.AOP.LogAspect=DEBUG
          EOF

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/3306) >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run tests
        run: ./gradlew test
